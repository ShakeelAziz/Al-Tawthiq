<!DOCTYPE html>
<html lang="en" class="__variable_6bee3b lenis lenis-smooth" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <title>Book a Contractual Offer | Al Tawthiq</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts (same as site) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Tajawal:wght@400;600;700;800&display=swap"
    rel="stylesheet">

  <!-- AOS (optional, already handled in main.js) -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- Page-specific styles -->
  <style>
    .contact-section {
      min-height: 100vh;
      background: var(--gray-100);
      padding: 160px 0 100px;
    }

    .contact-card {
      max-width: 760px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .contact-card h1 {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 800;
      margin-bottom: 12px;
      text-align: center;
    }

    .contact-card p {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 40px;
      font-size: 16px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full {
      grid-column: span 2;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
    }

    input,
    select {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      font-size: 14px;
      font-family: inherit;
      transition: border 0.2s, box-shadow 0.2s;
      background: var(--white);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary-purple);
      box-shadow: 0 0 0 3px rgba(91, 75, 154, 0.15);
    }

    .submit-wrap {
      margin-top: 32px;
      text-align: center;
    }

    .submit-wrap button {
      width: 240px;
      height: 54px;
      border-radius: 50px;
      border: none;
      background: var(--black);
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .submit-wrap button:hover {
      background: var(--primary-purple);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(91, 75, 154, 0.35);
    }

    @media (max-width: 768px) {
      .contact-card {
        padding: 36px 24px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-group.full {
        grid-column: span 1;
      }

    }
  </style>
</head>

<body>
  <div data-is-root-theme="true" data-accent-color="indigo" data-gray-color="slate" data-has-background="true"
    data-panel-background="translucent" data-radius="medium" data-scaling="100%" class="radix-themes">
    <div class="main-wrapper">

      <!-- NAVBAR (uses your existing navbar styles & JS) -->

      <!-- NAVBAR -->
      <nav id="navbar">
        <div class="container">
          <a href="home-en.html" class="logo">
            <img src="assets/images/logo_png.webp" alt="Al Tawthiq">
          </a>
          <ul>
            <li><a href="home-en.html">Home</a></li></ul>
          <a href="home-en.html" class="logo">
            <img src="assets/images/white__logo.webp" alt="Al Tawthiq">
          </a>
        </div>
      </nav>


      <!-- CONTACT FORM -->
      <section class="contact-section">
        <div class="container">
          <div class="contact-card" data-aos="fade-up">

            <h1>Book a Demo</h1>
            <p>Tell us a bit about your organization and we’ll schedule a demo that fits your needs.</p>

            <form id="contactForm">

              <div class="form-grid">

                <div class="form-group">
                  <label>Company Name</label>
                  <input type="text" name="company" placeholder="Your company name" required>
                </div>

                <div class="form-group">
                  <label>Email</label>
                  <input type="email" name="email" placeholder="company@email.com" required>
                </div>

                <div class="form-group">
                  <label>City</label>
                  <input type="text" name="city" placeholder="City" required>
                </div>

                <div class="form-group">
                  <label>Number of Employees</label>
                  <select name="employees" required>
                    <option value="">Select range</option>
                    <option>0 – 50</option>
                    <option>50 – 100</option>
                    <option>100 – 150</option>
                    <option>150 – 200</option>
                    <option>200 – 500</option>
                  </select>
                </div>

                <div class="form-group">
                  <label>Name</label>
                  <input type="text" name="name" placeholder="Full name" required>
                </div>

                <div class="form-group">
                  <label>Phone</label>
                  <input type="tel" name="phone" placeholder="Phone Number" required>
                </div>

                <div class="form-group">
                  <label>Preferred Meeting Type</label>
                  <select name="meeting" required>
                    <option value="">Select meeting type</option>
                    <option>Office</option>
                    <option>Remotely</option>
                  </select>
                </div>
                
                <div class="form-group">
                  <label>Position</label>
                  <input type="text" name="position" placeholder="Your Position" required>
                </div>
              </div>

              <div style="margin-top: 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="termsCheckbox" value="on" style="width: 18px; height: 18px; flex-shrink: 0; cursor: pointer;">
                <span class="text-caption font-normal font-poppins">
                  I agree to the
                  <a href="/en/terms-of-use" class="underline">Terms of Service</a>
                  and
                  <a href="/en/privacy-policy" class="underline">Privacy Policy</a>
                </span>
              </div>
              <div id="checkboxError" style="color: #dc2626; font-size: 13px; margin-bottom: 16px; display: none; text-align: center;">
                You must agree to the Terms of Service and Privacy Policy
              </div>
              <div class="submit-wrap">
                <button type="submit">Submit Request</button>
                <p id="contactFormMessage" role="status" aria-live="polite" style="margin-top: 12px;"></p>
              </div>

            </form>

          </div>
        </div>
      
      </section>

 <footer class="footer">
        <div class="footer-bottom">
        <p>Al Tawthiq. All rights reserved © 2026</p>

        </div>
        </footer>
      <!-- Scripts -->
      <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
      <script src="main.js"></script>
      <script>
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
          e.preventDefault();

          const form = this;
          const checkbox = document.getElementById('termsCheckbox');
          const errorDiv = document.getElementById('checkboxError');
          const messageEl = document.getElementById('contactFormMessage');
          const submitButton = form.querySelector('button[type="submit"]');

          messageEl.textContent = '';
          messageEl.style.color = '';

          if (!checkbox.checked) {
            errorDiv.style.display = 'block';
            return;
          }

          errorDiv.style.display = 'none';
          submitButton.disabled = true;

          const formData = new FormData(form);
          const data = Object.fromEntries(formData.entries());

          try {
            const response = await fetch('https://altawthiqsa.app.n8n.cloud/webhook-test/signup-form', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(data)
            });

            if (!response.ok) {
              throw new Error('Request failed');
            }

            messageEl.textContent = 'Your request has been submitted successfully.';
            messageEl.style.color = '#198754';
            form.reset();
          } catch (error) {
            messageEl.textContent = 'Something went wrong. Please try again.';
            messageEl.style.color = '#dc3545';
          } finally {
            submitButton.disabled = false;
          }
        });

        document.getElementById('contactForm').addEventListener('submit', function(e) {
          const checkbox = document.getElementById('termsCheckbox');
          const errorDiv = document.getElementById('checkboxError');
          
          if (!checkbox.checked) {
            e.preventDefault();
            errorDiv.style.display = 'block';
          } else {
            errorDiv.style.display = 'none';
          }
        }, true);

        document.getElementById('termsCheckbox').addEventListener('change', function() {
          const errorDiv = document.getElementById('checkboxError');
          if (this.checked) {
            errorDiv.style.display = 'none';
          }
        });
      </script>
    </div>
  </div>

</body>

</html>
