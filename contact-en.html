<!DOCTYPE html>
<html lang="en" class="__variable_6bee3b lenis lenis-smooth" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <title>Book a Demo | Al Tawthiq</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts (same as site) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Tajawal:wght@400;600;700;800&display=swap"
    rel="stylesheet">

  <!-- AOS (optional, already handled in main.js) -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- Page-specific styles -->
  <style>
    .contact-section {
      min-height: 100vh;
      background: var(--gray-100);
      padding: 160px 0 100px;
    }

    .contact-card {
      max-width: 760px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .contact-card h1 {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 800;
      margin-bottom: 12px;
      text-align: center;
    }

    .contact-card p {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 40px;
      font-size: 16px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full {
      grid-column: span 2;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
    }

    input,
    select {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      font-size: 14px;
      font-family: inherit;
      transition: border 0.2s, box-shadow 0.2s;
      background: var(--white);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary-purple);
      box-shadow: 0 0 0 3px rgba(91, 75, 154, 0.15);
    }

    .submit-wrap {
      margin-top: 32px;
      text-align: center;
    }

    .submit-wrap button {
      width: 240px;
      height: 54px;
      border-radius: 50px;
      border: none;
      background: var(--black);
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .submit-wrap button:hover {
      background: var(--primary-purple);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(91, 75, 154, 0.35);
    }

    @media (max-width: 768px) {
      .contact-card {
        padding: 36px 24px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-group.full {
        grid-column: span 1;
      }

    }
  </style>
</head>

<body>
  <div data-is-root-theme="true" data-accent-color="indigo" data-gray-color="slate" data-has-background="true"
    data-panel-background="translucent" data-radius="medium" data-scaling="100%" class="radix-themes">
    <div class="main-wrapper">

      <!-- NAVBAR (uses your existing navbar styles & JS) -->

      <!-- NAVBAR -->
      <nav id="navbar">
        <div class="container">
          <a href="home-en.html" class="logo">
            <img src="assets/logo_png.png" alt="Al Tawthiq">
          </a>
          <ul>
            <li><a href="home-en.html">Home</a></li>
          </ul>


          <a href="home-en.html" class="logo">
            <img src="assets/white__logo.png" alt="Al Tawthiq">
          </a>
        </div>
      </nav>
      <!-- CONTACT FORM -->
      <section class="contact-section">
        <div class="container">
          <div class="contact-card" data-aos="fade-up">

            <h1>Book a Demo</h1>
            <p>Tell us a bit about your organization and we’ll schedule a demo that fits your needs.</p>

            <form>

              <div class="form-grid">

                <div class="form-group">
                  <label>Company Name</label>
                  <input type="text" placeholder="Your company name" required>
                </div>

                <div class="form-group">
                  <label>Email</label>
                  <input type="email" placeholder="company@email.com" required>
                </div>

                <div class="form-group">
                  <label>City</label>
                  <input type="text" placeholder="City" required>
                </div>

                <div class="form-group">
                  <label>Number of Employees</label>
                  <select required>
                    <option value="">Select range</option>
                    <option>0 – 50</option>
                    <option>50 – 100</option>
                    <option>100 – 150</option>
                    <option>150 – 200</option>
                    <option>200 – 500</option>
                  </select>
                </div>

                <div class="form-group">
                  <label>Contact Person Name</label>
                  <input type="text" placeholder="Full name" required>
                </div>

                <div class="form-group">
                  <label>Contact Person Phone</label>
                  <input type="tel" placeholder="+1 234 567 890" required>
                </div>

                <div class="form-group full">
                  <label>Preferred Meeting Type</label>
                  <select required>
                    <option value="">Select meeting type</option>
                    <option>In Person</option>
                    <option>Office</option>
                    <option>Zoom</option>
                  </select>
                </div>

              </div>
              <div class="flex items-center gap-3">
                <button type="button" role="checkbox" aria-checked="false" data-state="unchecked" value="on"
                  class="flex h-4 w-4 rounded-sm border border-secondary-400 disabled:pointer-events-none disabled:opacity-50 data-[state=checked]:bg-green-500 data-[state=checked]:border-none focus:outline-none transition-all duration-300">
                </button>

                <input type="checkbox" aria-hidden="true"
                  style="transform: translateX(-100%); position: absolute; pointer-events: none; opacity: 0; margin: 0px; width: 16px; height: 16px;"
                  tabindex="-1" value="on">

                <p class="text-caption font-normal font-poppins">
                  I agree to the
                  <a href="/en/terms-of-use" class="underline">Terms of Service</a>
                  and
                  <a href="/en/privacy-policy" class="underline">Privacy Policy</a>
                </p>
              </div>
              <div class="submit-wrap">
                <button type="submit">Submit Request</button>
              </div>

            </form>

          </div>
        </div>
      </section>

      <!-- Scripts -->
      <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
      <script src="main.js"></script>

</body>

</html>
