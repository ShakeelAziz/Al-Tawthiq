<!DOCTYPE html>
<html lang="ar" dir="rtl" class="__variable_6bee3b lenis lenis-smooth">

<head>
  <meta charset="UTF-8" />
  <title>حجز عرض تجريبي | التوثيق</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts (same as site) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Tajawal:wght@400;600;700;800&display=swap"
    rel="stylesheet">

  <!-- AOS (optional, already handled in main.js) -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- Page-specific styles -->
  <style>
    .contact-section {
      min-height: 100vh;
      background: var(--gray-100);
      padding: 160px 0 100px;
    }

    .contact-card {
      max-width: 760px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .contact-card h1 {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 800;
      margin-bottom: 12px;
      text-align: center;
    }

    .contact-card p {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 40px;
      font-size: 16px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full {
      grid-column: span 2;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      text-align: right;
    }

    input,
    select {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      font-size: 14px;
      font-family: inherit;
      transition: border 0.2s, box-shadow 0.2s;
      background: var(--white);
      direction: rtl;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary-purple);
      box-shadow: 0 0 0 3px rgba(91, 75, 154, 0.15);
    }

    .submit-wrap {
      margin-top: 32px;
      text-align: center;
    }

    .submit-wrap button {
      width: 240px;
      height: 54px;
      border-radius: 50px;
      border: none;
      background: var(--black);
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .submit-wrap button:hover {
      background: var(--primary-purple);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(91, 75, 154, 0.35);
    }

    @media (max-width: 768px) {
      .contact-card {
        padding: 36px 24px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-group.full {
        grid-column: span 1;
      }

    }
  </style>
</head>

<body>
  <div data-is-root-theme="true" data-accent-color="indigo" data-gray-color="slate" data-has-background="true"
    data-panel-background="translucent" data-radius="medium" data-scaling="100%" class="radix-themes">
    <div class="main-wrapper">

      <!-- NAVBAR (uses your existing navbar styles & JS) -->

      <!-- NAVBAR -->
      <nav id="navbar">
        <div class="container">
          <a href="home-ar.html" class="logo">
            <img src="assets/images/logo_png.png" alt="التوثيق">
          </a>
          <ul>
            <li><a href="home-ar.html">الرئيسية</a></li>
          </ul>


          <a href="home-en.html" class="logo">
            <img src="assets/images/white__logo.png" alt="التوثيق">
          </a>
        </div>
      </nav>
      <!-- CONTACT FORM -->
      <section class="contact-section">
        <div class="container">
          <div class="contact-card" data-aos="fade-up">

            <h1>حجز عرض تجريبي</h1>
            <p>أخبرنا قليلاً عن مؤسستك وسنحدد موعدًا للعرض يناسب احتياجاتك.</p>

            <form id="contactForm">

              <div class="form-grid">

                <div class="form-group">
                  <label>اسم الشركة</label>
                  <input type="text" placeholder="اسم شركتك" required>
                </div>

                <div class="form-group">
                  <label>البريد الإلكتروني</label>
                  <input type="email" placeholder="company@email.com" required>
                </div>

                <div class="form-group">
                  <label>المدينة</label>
                  <input type="text" placeholder="المدينة" required>
                </div>

                <div class="form-group">
                  <label>عدد الموظفين</label>
                  <select required>
                    <option value="">اختر النطاق</option>
                    <option>0 – 50</option>
                    <option>50 – 100</option>
                    <option>100 – 150</option>
                    <option>150 – 200</option>
                    <option>200 – 500</option>
                  </select>
                </div>

                <div class="form-group">
                  <label>اسم</label>
                  <input type="text" placeholder="الاسم الكامل" required>
                </div>

                <div class="form-group">
                  <label>هاتف </label>
                  <input type="tel" placeholder="Phone number" required>
                </div>

                <div class="form-group">
                  <label>نوع الاجتماع المفضل</label>
                  <select required>
                    <option value="">اختر نوع الاجتماع</option>
                    <option>في المكتب</option>
                    <option>عن بعد</option>
                  </select>
                </div>
                  <div class="form-group">
                  <label>المسمى الوظيفي</label>
                  <input type="tel" placeholder="المسمى الوظيفي" required>
                </div>

              </div>
              <div style="margin-top: 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; justify-content: flex-end;">
                <input type="checkbox" id="termsCheckbox" value="on" style="width: 18px; height: 18px; flex-shrink: 0; cursor: pointer;">
                <span class="text-caption font-normal font-poppins" style="text-align: right;">
                  أوافق على
                  <a href="/ar/terms-of-use" class="underline">شروط الخدمة</a>
                  و
                  <a href="/ar/privacy-policy" class="underline">سياسة الخصوصية</a>
                </span>
              </div>
              <div id="checkboxError" style="color: #dc2626; font-size: 13px; margin-bottom: 16px; display: none; text-align: center;">
                يجب عليك الموافقة على شروط الخدمة وسياسة الخصوصية
              </div>
              <div class="submit-wrap">
                <button type="submit">إرسال الطلب</button>
              </div>

            </form>

          </div>
        </div>
      </section>
      <footer class="footer">
        <div class="footer-bottom">
        <p>التوثيق. جميع الحقوق محفوظة © 2026</p>

        </div>
        </footer>

      <!-- Scripts -->
      <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
      <script src="main.js"></script>
      <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
          const checkbox = document.getElementById('termsCheckbox');
          const errorDiv = document.getElementById('checkboxError');
          
          if (!checkbox.checked) {
            e.preventDefault();
            errorDiv.style.display = 'block';
          } else {
            errorDiv.style.display = 'none';
          }
        });

        document.getElementById('termsCheckbox').addEventListener('change', function() {
          const errorDiv = document.getElementById('checkboxError');
          if (this.checked) {
            errorDiv.style.display = 'none';
          }
        });
      </script>

</body>

</html>
